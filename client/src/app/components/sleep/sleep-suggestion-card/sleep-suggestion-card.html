<div class="sleep-card suggestion-card">
  <div class="section-heading">
    <p class="eyebrow">Sleep Suggestion</p>
    <h2>AI Sleep</h2>
  </div>

  <p aria-live="polite">
    {{ loading ? 'Generating sleep suggestion...' : suggestion }}
  </p>

  <button
    class="primary-button"
    type="button"
    (click)="generateSuggestion()"
    [disabled]="loading || logs.length === 0"
  >
    {{ loading ? 'Generating...' : 'Generate AI Suggestion' }}
  </button>
</div>
