<section class="sleep-card graph-widget">
  <div class="graph-top">
    <label class="graph-picker">
      <i class="bi bi-bar-chart-line" aria-hidden="true"></i>

      <select
        [(ngModel)]="graphView"
        (ngModelChange)="changeGraphView()"
        aria-label="Choose graph view"
      >
        <option value="week">Sleep duration</option>
        <option value="month">Current month</option>
        <option value="year">Current year</option>
      </select>
    </label>

    <div class="range-toggle" aria-label="Graph range">
      <button class="active" type="button">7d</button>
      <button type="button" disabled>30d</button>
    </div>
  </div>

  <div class="graph-area" aria-label="Sleep duration graph">
    <button
      class="graph-column"
      type="button"
      *ngFor="let bar of graphBars"
      [class.selected]="isSelected(bar)"
      (click)="selectBar(bar)"
      [attr.aria-pressed]="isSelected(bar)"
      [attr.aria-label]="bar.detail + ': ' + formatDuration(bar.minutes)"
    >
      <div class="bar-space">
        <div
          class="bar-fill"
          [style.height]="getBarHeight(bar.minutes)"
        ></div>
      </div>

      <span>{{ bar.label }}</span>
    </button>
  </div>

<div class="selected-bar-info" *ngIf="selectedBar">
  <div>
    <span>{{ selectedBar.detail }}</span>
    <strong>{{ formatDuration(selectedBar.minutes) }}</strong>
  </div>

  <p>
    {{ selectedBar.minutes > 0 ? 'Sleep logged for this period.' : 'No sleep logged for this period.' }}
  </p>
</div>
</section>
