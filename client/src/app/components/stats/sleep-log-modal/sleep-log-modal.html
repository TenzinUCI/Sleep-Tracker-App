<div class="modal-backdrop">
  <section
    class="sleep-card log-modal"
    role="dialog"
    aria-modal="true"
    aria-labelledby="modalTitle"
  >
    <button
      class="close-button"
      type="button"
      aria-label="Close modal"
      (click)="close()"
    >
      ×
    </button>

    <div class="modal-heading">
      <p>{{ log ? 'Edit Entry' : 'New Entry' }}</p>
      <h2 id="modalTitle">{{ title }}</h2>
    </div>

    <form class="modal-form" (ngSubmit)="save()">
      <section class="time-section">
        <div class="time-section-heading">
          <i class="bi bi-moon-stars-fill" aria-hidden="true"></i>
          <h3>Start</h3>
        </div>

        <div class="field-row">
          <label for="startDate">Date</label>
          <input
            id="startDate"
            name="startDate"
            type="date"
            [(ngModel)]="startDate"
            required
          />
        </div>

        <div class="field-row">
          <label for="startTime">Time</label>
          <input
            id="startTime"
            name="startTime"
            type="time"
            [(ngModel)]="startTime"
            required
          />
        </div>
      </section>

      <section class="time-section">
        <div class="time-section-heading">
          <i class="bi bi-sunrise-fill" aria-hidden="true"></i>
          <h3>End</h3>
        </div>

        <div class="field-row">
          <label for="endDate">Date</label>
          <input
            id="endDate"
            name="endDate"
            type="date"
            [(ngModel)]="endDate"
            required
          />
        </div>

        <div class="field-row">
          <label for="endTime">Time</label>
          <input
            id="endTime"
            name="endTime"
            type="time"
            [(ngModel)]="endTime"
            required
          />
        </div>
      </section>

      <div class="duration-box">
        <span>Duration</span>
        <strong>{{ durationText }}</strong>
      </div>

      <section class="rating-section">
        <label>Rating</label>
        <app-star-rating [(rating)]="rating" />
      </section>

      <div class="comment-section">
        <label for="comment">Comment <span>(optional)</span></label>
        <textarea
          id="comment"
          name="comment"
          rows="3"
          [(ngModel)]="comment"
          placeholder="Optional sleep note..."
        ></textarea>
      </div>

      <div class="modal-actions">
        <button
          class="secondary-button"
          type="button"
          (click)="close()"
        >
          Cancel
        </button>

        <button
          class="primary-button"
          type="submit"
          [disabled]="!canSave()"
        >
          Save
        </button>
      </div>
    </form>
  </section>
</div>
