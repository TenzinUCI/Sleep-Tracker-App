<section class="home-page">
  <div class="container-fluid px-0">
    <div class="row g-3">
      <section class="col-12">
        <app-recent-sleep-summary [sleepLog]="recentSleepLog" />
      </section>

      <section class="col-12 col-lg-8">
        <app-sleep-timer (sleepEnded)="handleSleepEnded($event)" />
      </section>

      <section class="col-12 col-lg-4">
        <app-sleep-suggestion-card [sleepLog]="recentSleepLog" [logs]="logs" />
      </section>
    </div>
  </div>
</section>

<app-sleep-review-modal *ngIf="showReviewModal" (reviewSubmitted)="handleReviewSubmitted($event)"
  (reviewSkipped)="handleReviewSkipped()" />
