<section class="stats-page">
  <div class="container-fluid px-0">
    <header class="stats-header">
      <h1>Stats</h1>
      <p>Patterns from your nights.</p>
    </header>

    <div class="summary-grid">
      <app-stat-summary-card
        label="Avg Sleep"
        [value]="averageSleep"
      />

      <app-stat-summary-card
        label="Avg Rating"
        [value]="averageRating"
      />

      <app-stat-summary-card
        label="Logged"
        [value]="totalLogs"
      />
    </div>

    <app-sleep-graph-widget [logs]="logs" />

    <app-sleep-log-widget
      [logs]="logs"
      (addClicked)="openAddModal()"
      (editClicked)="openEditModal($event)"
      (deleteClicked)="deleteLog($event)"
    />
  </div>
</section>

<app-sleep-log-modal
  *ngIf="modalOpen"
  [log]="logToEdit"
  (saveClicked)="saveLog($event)"
  (closeClicked)="closeModal()"
/>
